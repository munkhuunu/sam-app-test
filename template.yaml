AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: School Management System v3 — multi-tenant, invitation-based

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 128
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref SchoolTable
    Architectures:
      - arm64

Resources:
  SchoolTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: school-management
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: auth/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        AuthProxy:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [auth/index.ts]

  SchoolsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: schools/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolsRoot:
          Type: Api
          Properties:
            Path: /schools
            Method: ANY
        SchoolsById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}
            Method: ANY
        SchoolClasses:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/classes
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [schools/index.ts]

  InvitationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: invitations/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        InviteValidate:
          Type: Api
          Properties:
            Path: /invitations/validate/{token}
            Method: GET
        InvitesBySchool:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/invitations
            Method: ANY
        InviteByToken:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/invitations/{token}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [invitations/index.ts]

  StudentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: students/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolStudents:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students
            Method: ANY
        SchoolStudentById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students/{studentId}
            Method: ANY
        ClassStudents:
          Type: Api
          Properties:
            Path: /classes/{classId}/students
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [students/index.ts]

  TeachersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: teachers/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolTeachers:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/teachers
            Method: ANY
        TeachersAssign:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/teachers/assign
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [teachers/index.ts]

  SubjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: subjects/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolSubjects:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/subjects
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [subjects/index.ts]

  AssignmentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: assignments/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolAssignments:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/assignments
            Method: ANY
        AssignmentById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/assignments/{assignmentId}
            Method: ANY
        AssignmentGrades:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/assignments/{assignmentId}/grades
            Method: ANY
        StudentGrades:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students/{studentId}/grades
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [assignments/index.ts]

  AnnouncementsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: announcements/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        Announcements:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/announcements
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [announcements/index.ts]

  ParentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: parents/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        ParentStudents:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/parents/{parentId}/students
            Method: ANY
        ParentStudentById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/parents/{parentId}/students/{studentId}
            Method: ANY
        StudentParents:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students/{studentId}/parents
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [parents/index.ts]

  AttendanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: attendance/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        AttendanceRoot:
          Type: Api
          Properties:
            Path: /attendance
            Method: ANY
        AttendanceStudent:
          Type: Api
          Properties:
            Path: /attendance/{studentId}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [attendance/index.ts]

  DashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: dashboard/index.lambdaHandler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        DashboardRoot:
          Type: Api
          Properties:
            Path: /dashboard
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [dashboard/index.ts]

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  SchoolTableName:
    Description: DynamoDB table name
    Value: !Ref SchoolTable
