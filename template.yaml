AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: School Management System v3 — multi-tenant, invitation-based

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      # TODO: CloudFront URL-аар солих — AllowOrigin: "'https://xxx.cloudfront.net'"
      AllowOrigin: "'*'"
  Function:
    Timeout: 10
    Runtime: nodejs22.x
    MemorySize: 128
    Tracing: Active
    AutoPublishAlias: live
    Environment:
      Variables:
        TABLE_NAME: !Ref SchoolTable
    Architectures:
      - arm64

Resources:
  # ════════════════════════════════════════════
  # DynamoDB Table
  # ════════════════════════════════════════════
  SchoolTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: school-management
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ════════════════════════════════════════════
  # Lambda Functions
  # ════════════════════════════════════════════
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: auth/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref AuthFunctionErrorAlarm
          - !Ref AuthFunctionDurationAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        AuthProxy:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [auth/index.ts]

  SchoolsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: schools/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref SchoolsFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolsRoot:
          Type: Api
          Properties:
            Path: /schools
            Method: ANY
        SchoolsById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}
            Method: ANY
        SchoolClasses:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/classes
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [schools/index.ts]

  InvitationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: invitations/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref InvitationsFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        InviteValidate:
          Type: Api
          Properties:
            Path: /invitations/validate/{token}
            Method: GET
        InvitesBySchool:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/invitations
            Method: ANY
        InviteByToken:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/invitations/{token}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [invitations/index.ts]

  StudentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: students/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref StudentsFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolStudents:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students
            Method: ANY
        SchoolStudentById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students/{studentId}
            Method: ANY
        ClassStudents:
          Type: Api
          Properties:
            Path: /classes/{classId}/students
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [students/index.ts]

  TeachersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: teachers/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref TeachersFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolTeachers:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/teachers
            Method: ANY
        TeachersAssign:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/teachers/assign
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [teachers/index.ts]

  SubjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: subjects/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref SubjectsFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolSubjects:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/subjects
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [subjects/index.ts]

  AssignmentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: assignments/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref AssignmentsFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        SchoolAssignments:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/assignments
            Method: ANY
        AssignmentById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/assignments/{assignmentId}
            Method: ANY
        AssignmentGrades:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/assignments/{assignmentId}/grades
            Method: ANY
        StudentGrades:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students/{studentId}/grades
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [assignments/index.ts]

  AnnouncementsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: announcements/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref AnnouncementsFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        Announcements:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/announcements
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [announcements/index.ts]

  ParentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: parents/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref ParentsFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        ParentStudents:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/parents/{parentId}/students
            Method: ANY
        ParentStudentById:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/parents/{parentId}/students/{studentId}
            Method: ANY
        StudentParents:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/students/{studentId}/parents
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [parents/index.ts]

  AttendanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: attendance/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref AttendanceFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        AttendanceRoot:
          Type: Api
          Properties:
            Path: /attendance
            Method: ANY
        AttendanceStudent:
          Type: Api
          Properties:
            Path: /attendance/{studentId}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [attendance/index.ts]

  DashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: dashboard/index.lambdaHandler
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref DashboardFunctionErrorAlarm
          - !Ref ApiGateway5xxAlarm
          - !Ref DynamoDBThrottleAlarm
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: sam-app-test/jwt-secret
        - DynamoDBCrudPolicy:
            TableName: !Ref SchoolTable
      Events:
        DashboardRoot:
          Type: Api
          Properties:
            Path: /dashboard
            Method: GET
        DashboardSuperAdmin:
          Type: Api
          Properties:
            Path: /dashboard/global
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [dashboard/index.ts]

  # ════════════════════════════════════════════
  # Monitoring — SNS Topic
  # ════════════════════════════════════════════
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: sam-app-test-alerts
      Subscription:
        - Protocol: email
          Endpoint: munkhbaatarb445@gmail.com

  # ════════════════════════════════════════════
  # Monitoring — Lambda Error Alarms
  # ════════════════════════════════════════════
  AuthFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Auth-Errors
      AlarmDescription: AuthFunction Lambda errors >= 1
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AuthFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  SchoolsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Schools-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SchoolsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  InvitationsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Invitations-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref InvitationsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  StudentsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Students-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref StudentsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  TeachersFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Teachers-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref TeachersFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  SubjectsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Subjects-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SubjectsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  AssignmentsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Assignments-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AssignmentsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  AnnouncementsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Announcements-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AnnouncementsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  ParentsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Parents-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ParentsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  AttendanceFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Attendance-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AttendanceFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  DashboardFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Dashboard-Errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DashboardFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # ════════════════════════════════════════════
  # Monitoring — Duration / Latency
  # ════════════════════════════════════════════
  AuthFunctionDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-Auth-HighDuration
      AlarmDescription: AuthFunction p95 duration > 8s (timeout 10s)
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref AuthFunction
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 2
      Threshold: 8000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  ApiGatewayLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-API-p99-Latency
      AlarmDescription: API Gateway p99 latency > 3s for 5 minutes
      Namespace: AWS/ApiGateway
      MetricName: Latency
      Dimensions:
        - Name: ApiName
          Value: sam-app-test
        - Name: Stage
          Value: Prod
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # ════════════════════════════════════════════
  # Monitoring — API Gateway 5xx Alarm
  # ════════════════════════════════════════════
  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-API-5xx-Errors
      AlarmDescription: API Gateway 5xx errors >= 3 within 1 minute
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: sam-app-test
        - Name: Stage
          Value: Prod
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # ════════════════════════════════════════════
  # Monitoring — DynamoDB Throttle Alarm
  # ════════════════════════════════════════════
  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sam-app-test-DynamoDB-Throttles
      AlarmDescription: DynamoDB throttled requests >= 5
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Dimensions:
        - Name: TableName
          Value: !Ref SchoolTable
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]

  # ════════════════════════════════════════════
  # Composite — Overall System Health
  # ════════════════════════════════════════════
  SystemHealthCompositeAlarm:
    Type: AWS::CloudWatch::CompositeAlarm
    Properties:
      AlarmName: sam-app-test-System-Health
      AlarmDescription: Composite — fires if API 5xx OR DDB throttle OR Auth errors
      AlarmRule: !Sub
        - "ALARM(${A1}) OR ALARM(${A2}) OR ALARM(${A3})"
        - A1: !Ref ApiGateway5xxAlarm
          A2: !Ref DynamoDBThrottleAlarm
          A3: !Ref AuthFunctionErrorAlarm
      AlarmActions: [!Ref AlertTopic]
      OKActions: [!Ref AlertTopic]

  # ════════════════════════════════════════════
  # Monitoring — CloudWatch Dashboard
  # ════════════════════════════════════════════
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: sam-app-test-dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": {
                "markdown": "# 🏫 School Management System — Monitoring Dashboard\n**Region:** ${AWS::Region}  ·  **Stack:** sam-app-test  ·  **Composite health:** sam-app-test-System-Health"
              }
            },
            {
              "type": "alarm",
              "x": 0, "y": 1, "width": 24, "height": 3,
              "properties": {
                "title": "🚨 Alarm Status (бүх alarm)",
                "alarms": [
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-System-Health",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Auth-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Schools-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Students-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Teachers-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Assignments-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Invitations-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Announcements-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Parents-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Attendance-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Subjects-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Dashboard-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-Auth-HighDuration",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-API-5xx-Errors",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-API-p99-Latency",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:sam-app-test-DynamoDB-Throttles"
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 4, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors (бүх function)",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "stat": "Sum",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "${AuthFunction}",         {"label": "Auth"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${SchoolsFunction}",      {"label": "Schools"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${StudentsFunction}",     {"label": "Students"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${TeachersFunction}",     {"label": "Teachers"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${AssignmentsFunction}",  {"label": "Assignments"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${InvitationsFunction}",  {"label": "Invitations"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${AnnouncementsFunction}",{"label": "Announcements"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${ParentsFunction}",      {"label": "Parents"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${AttendanceFunction}",   {"label": "Attendance"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "${DashboardFunction}",    {"label": "Dashboard"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 4, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Invocations (бүх function)",
                "view": "timeSeries",
                "stacked": true,
                "region": "${AWS::Region}",
                "period": 60,
                "stat": "Sum",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AuthFunction}",         {"label": "Auth"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${SchoolsFunction}",      {"label": "Schools"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${StudentsFunction}",     {"label": "Students"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${TeachersFunction}",     {"label": "Teachers"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AssignmentsFunction}",  {"label": "Assignments"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${InvitationsFunction}",  {"label": "Invitations"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AnnouncementsFunction}",{"label": "Announcements"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ParentsFunction}",      {"label": "Parents"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AttendanceFunction}",   {"label": "Attendance"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${DashboardFunction}",    {"label": "Dashboard"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 10, "width": 8, "height": 6,
              "properties": {
                "title": "Lambda Duration p95 (ms)",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "p95",
                "annotations": {
                  "horizontal": [{"label": "Timeout (10s)", "value": 10000, "color": "#d62728"},
                                 {"label": "Warn (8s)",     "value": 8000,  "color": "#ff7f0e"}]
                },
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${AuthFunction}",        {"label": "Auth"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${SchoolsFunction}",     {"label": "Schools"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${StudentsFunction}",    {"label": "Students"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${TeachersFunction}",    {"label": "Teachers"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${AssignmentsFunction}", {"label": "Assignments"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${DashboardFunction}",   {"label": "Dashboard"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 8, "y": 10, "width": 8, "height": 6,
              "properties": {
                "title": "Lambda Concurrency & Throttles",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 60,
                "metrics": [
                  ["AWS/Lambda", "ConcurrentExecutions", "FunctionName", "${AuthFunction}",     {"label": "Auth concurrent",     "stat": "Maximum"}],
                  ["AWS/Lambda", "ConcurrentExecutions", "FunctionName", "${SchoolsFunction}",  {"label": "Schools concurrent",  "stat": "Maximum"}],
                  ["AWS/Lambda", "Throttles", "FunctionName", "${AuthFunction}",                {"label": "Auth throttles",     "stat": "Sum", "color": "#d62728"}],
                  ["AWS/Lambda", "Throttles", "FunctionName", "${SchoolsFunction}",             {"label": "Schools throttles",  "stat": "Sum", "color": "#ff7f0e"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 16, "y": 10, "width": 8, "height": 6,
              "properties": {
                "title": "API Gateway — Requests & Errors",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "stat": "Sum",
                "metrics": [
                  ["AWS/ApiGateway", "Count",    "ApiName", "sam-app-test", "Stage", "Prod", {"label": "Total Requests"}],
                  ["AWS/ApiGateway", "5XXError", "ApiName", "sam-app-test", "Stage", "Prod", {"label": "5xx Errors", "color": "#d62728"}],
                  ["AWS/ApiGateway", "4XXError", "ApiName", "sam-app-test", "Stage", "Prod", {"label": "4xx Errors", "color": "#ff7f0e"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 16, "width": 12, "height": 6,
              "properties": {
                "title": "API Gateway — Latency (p50/p95/p99)",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 60,
                "annotations": {
                  "horizontal": [{"label": "p99 SLO 3s", "value": 3000, "color": "#d62728"}]
                },
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiName", "sam-app-test", "Stage", "Prod", {"label": "p50", "stat": "p50"}],
                  ["...",                                                                  {"label": "p95", "stat": "p95"}],
                  ["...",                                                                  {"label": "p99", "stat": "p99"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 16, "width": 12, "height": 6,
              "properties": {
                "title": "DynamoDB — Throttles & Latency",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "metrics": [
                  ["AWS/DynamoDB", "ThrottledRequests",        "TableName", "school-management", {"label": "Throttles", "stat": "Sum", "color": "#d62728"}],
                  ["AWS/DynamoDB", "SuccessfulRequestLatency", "TableName", "school-management", "Operation", "GetItem", {"label": "GetItem p99", "stat": "p99"}],
                  ["AWS/DynamoDB", "SuccessfulRequestLatency", "TableName", "school-management", "Operation", "PutItem", {"label": "PutItem p99", "stat": "p99"}],
                  ["AWS/DynamoDB", "SuccessfulRequestLatency", "TableName", "school-management", "Operation", "Query",   {"label": "Query p99",   "stat": "p99"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 22, "width": 24, "height": 5,
              "properties": {
                "title": "DynamoDB — Capacity Consumption",
                "view": "timeSeries",
                "stacked": true,
                "region": "${AWS::Region}",
                "period": 60,
                "stat": "Sum",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits",  "TableName", "school-management", {"label": "Read CU"}],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "school-management", {"label": "Write CU"}]
                ]
              }
            }
          ]
        }

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  SchoolTableName:
    Description: DynamoDB table name
    Value: !Ref SchoolTable
  AlertTopicArn:
    Description: SNS Alert Topic ARN
    Value: !Ref AlertTopic
  DashboardUrl:
    Description: CloudWatch Dashboard URL
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=sam-app-test-dashboard"
  CompositeHealthAlarm:
    Description: System health composite alarm name
    Value: !Ref SystemHealthCompositeAlarm