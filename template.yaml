AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    Environment:
      Variables:
        SCHOOLS_TABLE: schools      # ← шууд нэр бичнэ
        CLASSES_TABLE: classes
        STUDENTS_TABLE: students

Resources:

  # ── SCHOOLS ─────────────────────────────────────

  ListSchoolsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: schools/list.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: schools      # ← шууд нэр бичнэ
      Events:
        ListSchools:
          Type: Api
          Properties:
            Path: /schools
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [schools/list.ts]

  CreateSchoolFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: schools/create.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: schools
      Events:
        CreateSchool:
          Type: Api
          Properties:
            Path: /schools
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [schools/create.ts]

  # ── CLASSES ─────────────────────────────────────

  ListClassesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: classes/list.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: classes
      Events:
        ListClasses:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/classes
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [classes/list.ts]

  CreateClassFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: classes/create.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: classes
      Events:
        CreateClass:
          Type: Api
          Properties:
            Path: /schools/{schoolId}/classes
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [classes/create.ts]

  # ── STUDENTS ────────────────────────────────────

  ListStudentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: students/list.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: students
      Events:
        ListStudents:
          Type: Api
          Properties:
            Path: /classes/{classId}/students
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [students/list.ts]

  CreateStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: students/create.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: students
      Events:
        CreateStudent:
          Type: Api
          Properties:
            Path: /students
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [students/create.ts]

  GetStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: students/getById.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: students
        - DynamoDBCrudPolicy:
            TableName: classes
        - DynamoDBCrudPolicy:
            TableName: schools
      Events:
        GetStudent:
          Type: Api
          Properties:
            Path: /students/{studentId}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [students/getById.ts]

Outputs:
  ApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"